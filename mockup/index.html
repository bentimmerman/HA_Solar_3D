<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PV 3D Bar-Graph — Mock-up</title>
    <style>
      :root {
        --bg: #0a1420;
        --panel: rgba(16, 28, 44, 0.82);
        --border: rgba(120, 170, 255, 0.28);
        --text: #dfe9f7;
        --muted: #8ba3c4;
        --accent: #47b5ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #scene {
        position: absolute;
        inset: 0;
      }
      .hud {
        position: absolute;
        top: 18px;
        left: 18px;
        max-width: 380px;
        width: 380px;
        max-height: calc(100vh - 36px);
        display: flex;
        flex-direction: column;
        padding: 16px 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      .hud h1 {
        margin: 0 0 4px;
        font-size: 16px;
        letter-spacing: 0.2px;
      }
      .hud .sub {
        margin: 0 0 14px;
        font-size: 12px;
        color: var(--muted);
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 6px 0;
        font-size: 13px;
      }
      .stat-row .v {
        font-weight: 700;
        color: #fff;
      }
      .controls {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(71, 181, 255, 0.12);
        color: var(--text);
        padding: 7px 12px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.05s;
      }
      button:hover {
        background: rgba(71, 181, 255, 0.24);
      }
      button:active {
        transform: translateY(1px);
      }
      button.active {
        background: var(--accent);
        color: #06121f;
        border-color: var(--accent);
      }
      /* --- panel mapping table --- */
      .panels {
        margin-top: 14px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panels .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .panels .head h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .table-wrap {
        overflow-y: auto;
        max-height: 40vh;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: rgba(12, 22, 36, 0.96);
        color: var(--muted);
        font-weight: 600;
        text-align: left;
        padding: 7px 8px;
        border-bottom: 1px solid var(--border);
        z-index: 1;
      }
      tbody td {
        padding: 5px 8px;
        border-bottom: 1px solid rgba(120, 170, 255, 0.12);
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      td.id {
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        color: #bcd4f5;
        white-space: nowrap;
      }
      td.power {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
      }
      td.power .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
        background: #2196f3;
      }
      input.entity {
        width: 100%;
        min-width: 120px;
        box-sizing: border-box;
        background: rgba(8, 16, 28, 0.7);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-size: 11px;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        padding: 5px 7px;
      }
      input.entity:focus {
        outline: none;
        border-color: var(--accent);
        background: rgba(8, 16, 28, 0.95);
      }
      input.entity::placeholder {
        color: #5f7797;
      }
      .yaml-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .yaml-actions .hint {
        font-size: 11px;
        color: var(--muted);
        align-self: center;
      }
      .legend {
        position: absolute;
        bottom: 18px;
        left: 18px;
        padding: 12px 16px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        backdrop-filter: blur(10px);
        font-size: 12px;
      }
      .legend .bar {
        height: 10px;
        width: 220px;
        border-radius: 6px;
        margin: 8px 0 4px;
        background: linear-gradient(
          90deg,
          #2196f3 0%,
          #00e5d1 58%,
          #76ff03 100%
        );
      }
      .legend .scale {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(71, 181, 255, 0.16);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 14px;
        color: var(--muted);
        background: radial-gradient(circle at 50% 40%, #14263a, #0a1420);
      }
      .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="scene"></div>

      <div class="hud">
        <span class="badge">MOCK-UP</span>
        <h1>PV 3D Bar-Graph</h1>
        <p class="sub">
          Live opbrengst per zonnepaneel, geplot als 3D-staaf op het model.
        </p>
        <div class="stat-row">
          <span>Panelen gedetecteerd</span><span class="v" id="s-count">–</span>
        </div>
        <div class="stat-row">
          <span>Totaal vermogen</span><span class="v" id="s-total">– W</span>
        </div>
        <div class="stat-row">
          <span>Piekpaneel</span><span class="v" id="s-peak">–</span>
        </div>
        <div class="controls">
          <button id="btn-sim" class="active">Simulatie: aan</button>
          <button id="btn-rotate">Auto-draai</button>
          <button id="btn-tint" class="active">Paneel-vulling</button>
        </div>

        <div class="panels">
          <div class="head">
            <h2>Paneel-koppeling</h2>
            <span class="hint" id="map-status"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th style="text-align:right">Vermogen</th>
                  <th>HA sensor</th>
                </tr>
              </thead>
              <tbody id="panel-rows"></tbody>
            </table>
          </div>
          <div class="yaml-actions">
            <button id="btn-yaml">YAML downloaden</button>
            <span class="hint">Opgeslagen in je browser</span>
          </div>
        </div>
      </div>

      <div class="legend">
        <div>Vermogen per paneel</div>
        <div class="bar"></div>
        <div class="scale"><span>0 W</span><span id="leg-max">370 W</span></div>
      </div>

      <div id="loading"><div style="text-align:center"><div class="spinner"></div>Model laden…</div></div>
    </div>

    <script type="module" src="./mockup.js"></script>
  </body>
</html>
