# PV 3D Bar-Graph — voorbeeld dashboardconfiguratie
#
# Plak dit als een handmatige (YAML) kaart op een Lovelace-dashboard nadat de
# integratie via HACS + "Add Integration" is toegevoegd.
#
# Tip: laat `panels` eerst leeg. De kaart toont dan de automatisch gedetecteerde
# paneel-id's op het model, zodat je ze hieronder kunt invullen.
#
# Alternatief: je hoeft `panels` hier niet in te vullen. Als je de mapping in
# <config>/pv_3d_bargraph.yaml zet (bijv. het bestand dat de mock-up exporteert
# via "YAML downloaden"), laadt de kaart die automatisch.

type: custom:pv-3d-bargraph-card
title: Zonnepanelen — live opbrengst
model_url: /pv_3d_bargraph/house2.glb
max_value: 370        # Wp bij vol vermogen -> volledig gevuld paneel
unit: W
auto_rotate: false
tint_panels: true
show_labels: true
panels:
  - id: panel_01
    entity: sensor.pv_paneel_1_power
    name: Paneel 1
  - id: panel_02
    entity: sensor.pv_paneel_2_power
    name: Paneel 2
