# PV 3D Bar-Graph — paneel-koppeling
# ==================================
# Plaats dit bestand als:
#
#     <config>/pv_3d_bargraph.yaml
#
# De integratie leest het via het endpoint /api/pv_3d_bargraph/panels en de
# kaart gebruikt het automatisch wanneer je in de kaart zelf geen `panels:`
# opgeeft. Dit is exact het bestand dat de mock-up genereert met de knop
# "YAML downloaden".
#
# Elk item koppelt een gedetecteerd paneel-id aan een Home Assistant sensor.

# Welke GLB wordt gebruikt. Standaard het meegeleverde model dat de integratie
# serveert. Wil je een eigen model? Plaats het in
#   custom_components/pv_3d_bargraph/frontend/
# en verwijs ernaar als /pv_3d_bargraph/<bestand>.glb, of zet het in je
# www-map en gebruik een /local/<bestand>.glb pad.
# Let op: exporteer je model met dezelfde (originele) oriëntatie als house2.glb;
# de integratie past altijd dezelfde vaste rotatie toe, zodat de plaatsing
# identiek blijft.
model_url: /pv_3d_bargraph/house2.glb

panels:
  - id: panel_01
    entity: sensor.pv_paneel_1_power
    name: Paneel 1
    max_value: 370
